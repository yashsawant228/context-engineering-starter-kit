# Gemini-specific configuration overrides.

model:
  family: "gemini"
  name: "gemini-2.0-pro"
  max_tokens: 1200
  temperature: 0.25
  top_p: 0.9

gemini:
  # Context/Task/Format schema used by the ModelFormatter.
  context_header: "Context:"
  task_header: "Task:"
  format_header: "Format:"
  safety:
    # Safety settings here are conceptual; map them to your actual Gemini client.
    enable_harassment_filter: true
    enable_hate_speech_filter: true
    enable_medical_safety: true
  grounding:
    # Whether to prefer grounded answers using provided context.
    prefer_grounded_answers: true
    # If true, instruct the model to explicitly highlight when it is uncertain.
    emphasise_uncertainty: true
